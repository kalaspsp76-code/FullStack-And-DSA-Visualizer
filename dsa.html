<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSA Search Visualizer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
        }
        
        .array-container {
            display: flex;
            gap: 15px;
            margin: 30px 0;
        }
        
        .array-box {
            width: 60px;
            height: 60px;
            background-color: #3498db;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            font-weight: bold;
            border-radius: 8px;
            transition: background-color 0.4s ease;
        }
        
        button {
            padding: 12px 24px;
            font-size: 16px;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        
        #status {
            font-size: 18px;
            margin-top: 20px;
            color: #2c3e50;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <h1>Linear Search Algorithm Visualizer</h1>
    <p>Target value to find: <strong>45</strong></p>
    <div class="array-container">
        <div class="array-box" id="box0">12</div>
        <div class="array-box" id="box1">24</div>
        <div class="array-box" id="box2">8</div>
        <div class="array-box" id="box3">45</div>
        <div class="array-box" id="box4">19</div>
    </div>
    <button onclick="startVisualizer()">Start Search Animation</button>
    <p id="status">Click the button to see the algorithm work step-by-step.</p>
    <script>
        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        async function startVisualizer() {
            const target = 45;
            const values = [12, 24, 8, 45, 19];
            const statusText = document.getElementById("status");

            for (let i = 0; i < values.length; i++) {
                let currentBox = document.getElementById("box" + i);

                currentBox.style.backgroundColor = "#e67e22";
                statusText.innerText = "Checking index " + i + ": Does " + values[i] + " equal " + target + "?";

                await sleep(1200);

                if (values[i] === target) {
                    currentBox.style.backgroundColor = "#2ecc71";
                    statusText.innerText = "Success! Target value " + target + " found at Index " + i + ".";
                    break;
                } else {
                    currentBox.style.backgroundColor = "#95a5a6";
                }
            }
        }
    </script>
</body>

</html>
