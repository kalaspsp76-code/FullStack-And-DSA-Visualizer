<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Professional Portfolio</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #eef2f3;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        
        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 400px;
        }
        
        h1 {
            color: #2c3e50;
        }
        
        p {
            color: #7f8c8d;
            font-size: 16px;
        }
    </style>
</head>

<body>
    <div class="card">
        <!-- We use the clean title and description variables passed from Python -->
        <h1>{{ title }}</h1>
        <p>{{ description }}</p>
    </div>
</body>

</html>
